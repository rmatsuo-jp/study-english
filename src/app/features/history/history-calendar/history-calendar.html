<!-- @file 月表示カレンダーグリッド＋日付フィルタバナー。history.html から切り出したセッションカレンダー UI。 -->
<div class="calendar-nav">
  <button
    class="calendar-nav-btn"
    (click)="prevMonth()"
    [attr.aria-label]="i18n.t('history.prevMonth')"
  >
    ‹
  </button>
  <span class="calendar-month-label">{{ calendarMonthLabel() }}</span>
  <button
    class="calendar-nav-btn"
    (click)="nextMonth()"
    [attr.aria-label]="i18n.t('history.nextMonth')"
  >
    ›
  </button>
</div>

<div class="calendar-weekdays">
  @for (w of weekdayLabels(); track w) {
    <span class="weekday-cell">{{ w }}</span>
  }
</div>

<div class="calendar-grid">
  @for (cell of calendarCells(); track cell.dayKey) {
    <button
      class="calendar-cell"
      [class.other-month]="!cell.inMonth"
      [class.today]="cell.isToday"
      [class.selected]="selectedDate() === cell.dayKey"
      [class.has-session]="cell.hasSession"
      (click)="selectDay(cell.dayKey)"
    >
      <span class="cell-day">{{ cell.date.getDate() }}</span>
      @if (cell.evaluation; as ev) {
        <span class="cell-eval-row">
          <span class="cell-score">{{ ev.overallScore }}</span>
          <span class="cell-cefr">{{ ev.overallCefr }}</span>
        </span>
      } @else if (cell.hasSession) {
        <span class="cell-dot"></span>
      }
    </button>
  }
</div>

@if (selectedDate()) {
  <div class="date-filter-banner">
    <span>{{ i18n.t('history.dateFilterBanner', { date: formatDayKey(selectedDate()!) }) }}</span>
    <button class="toolbar-btn" (click)="clearDateFilter()">
      {{ i18n.t('history.clearFilter') }}
    </button>
  </div>
}
