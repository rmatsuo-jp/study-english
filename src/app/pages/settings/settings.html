<!-- @file Settings ページテンプレート。アカウント（Google SSO 同期）・テーマ・API キー・モデル・プロンプトプレビューを含む。 -->
<div class="page">
  <h1 class="page-title">設定</h1>

  <!-- ── アカウント（Google ログインでデータを複数端末で共有） ─────────── -->
  <div class="form-group">
    <label class="label">アカウント（データ同期）</label>
    <p class="hint">Google でログインすると、添削データを他の端末と共有できます。</p>
    @if (user(); as u) {
      <div class="account-card">
        @if (u.photoURL) {
          <img class="account-avatar" [src]="u.photoURL" alt="" referrerpolicy="no-referrer" />
        }
        <div class="account-info">
          <strong>{{ u.displayName || 'ログイン中' }}</strong>
          <span class="account-email">{{ u.email }}</span>
        </div>
        <button class="btn-secondary" (click)="logout()" [disabled]="authBusy()" type="button">
          ログアウト
        </button>
      </div>
    } @else {
      <button class="btn-primary" (click)="login()" [disabled]="authBusy()" type="button">
        @if (authBusy()) { 処理中… } @else { Google でログイン }
      </button>
    }
  </div>

  <div class="form-group">
    <label class="label">外観テーマ</label>
    <div class="theme-toggle">
      <button class="theme-btn" [class.active]="settings().theme === 'light'"
              (click)="update('theme', 'light')" type="button">ライト</button>
      <button class="theme-btn" [class.active]="settings().theme === 'dark'"
              (click)="update('theme', 'dark')" type="button">ダーク</button>
    </div>
  </div>

  <div class="form-group">
    <label class="label">Gemini API キー</label>
    <p class="hint">
      <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a>
      で無料取得できます。
    </p>
    <div class="key-input-wrap">
      <input
        class="input"
        [type]="showKey() ? 'text' : 'password'"
        [value]="settings().apiKey"
        (input)="update('apiKey', $any($event.target).value)"
        placeholder="AIza..."
      />
      <button class="toggle-key" (click)="showKey.set(!showKey())" type="button">
        {{ showKey() ? '隠す' : '表示' }}
      </button>
    </div>
  </div>

  <div class="form-group">
    <label class="label">モデル</label>
    <select class="select" [value]="settings().model" (change)="update('model', $any($event.target).value)">
      @for (m of models; track m.value) {
        <option [value]="m.value">{{ m.label }}</option>
      }
    </select>
  </div>

  <div class="form-group">
    <label class="label">プロンプトプレビュー</label>
    <p class="hint">添削時に自動生成されるプロンプトです。</p>
    <textarea class="textarea" rows="12" readonly [value]="promptPreview()"></textarea>
  </div>

  <div class="actions">
    <button class="btn-primary" (click)="save()">
      @if (saved()) { ✓ 保存しました } @else { 保存する }
    </button>
  </div>

  <!-- ── バージョン情報（version.ts はビルド時に自動生成） ─────────── -->
  <div class="form-group">
    <label class="label">バージョン情報</label>
    <p class="hint">バージョン {{ version }}（リリース日 {{ releaseDate }}）</p>
  </div>

</div>
