name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          # semantic-release は全コミット履歴とタグを参照して次バージョンを判定するため全取得する
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npx ng test --watch=false

      # ビルドが壊れている場合はここで止め、以降のリリース（タグ・バージョン確定）を作成しない
      - name: Build (verify)
        run: npm run build -- --base-href=/eibun-lab/

      # コミット種別から次バージョンを判定 → package.json / src/version.ts / CHANGELOG.md を更新し
      # タグ・GitHub Release を作成して main へ push([skip ci] 付きで再帰起動しない)
      - name: Release (bump version, tag, changelog)
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Firestore rules
        run: npx firebase-tools deploy --only firestore:rules --project eibun-lab
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # semantic-release が src/version.ts を最新バージョンへ更新したため、成果物用に再ビルドする
      - name: Build
        run: npm run build -- --base-href=/eibun-lab/

      - name: SPA fallback (404.html)
        run: cp dist/eibun-lab/browser/index.html dist/eibun-lab/browser/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/eibun-lab/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
