<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 紙 -->
  <rect x="80" y="40" width="352" height="432" rx="24" fill="#ffffff" stroke="#d0d0d0" stroke-width="8"/>

  <!-- テキスト行（薄いグレー） -->
  <line x1="128" y1="130" x2="384" y2="130" stroke="#d0d0d0" stroke-width="16" stroke-linecap="round"/>
  <line x1="128" y1="185" x2="384" y2="185" stroke="#d0d0d0" stroke-width="16" stroke-linecap="round"/>
  <line x1="128" y1="240" x2="310" y2="240" stroke="#d0d0d0" stroke-width="16" stroke-linecap="round"/>

  <!-- 添削：取り消し線（赤） -->
  <line x1="128" y1="182" x2="330" y2="182" stroke="#e53935" stroke-width="10" stroke-linecap="round"/>

  <!-- 添削：修正テキスト（赤、上の行） -->
  <line x1="128" y1="105" x2="200" y2="105" stroke="#e53935" stroke-width="12" stroke-linecap="round"/>
  <line x1="215" y1="105" x2="310" y2="105" stroke="#e53935" stroke-width="12" stroke-linecap="round"/>

  <!-- 挿入キャレット（^） -->
  <polyline points="148,200 172,224 196,200" fill="none" stroke="#e53935" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 赤ペン（斜め配置） -->
  <g transform="translate(310, 310) rotate(-45)">
    <rect x="-18" y="-130" width="36" height="145" rx="6" fill="#e53935"/>
    <rect x="6" y="-122" width="8" height="110" rx="3" fill="#c62828"/>
    <polygon points="-18,15 18,15 6,60 -6,60" fill="#9e9e9e"/>
    <polygon points="-6,60 6,60 0,80" fill="#424242"/>
    <rect x="-18" y="-148" width="36" height="22" rx="6" fill="#c62828"/>
  </g>

  <!-- チェック丸（右下） -->
  <circle cx="390" cy="420" r="44" fill="#e53935"/>
  <polyline points="370,420 385,438 413,402" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
